name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  validate:
    name: Validate application, design handoff and Figma automation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate design-system handoff
        run: npm run validate:design

      - name: Validate Figma canvas automation
        run: npm run validate:figma-plugin

      - name: Type-check active Next.js application
        run: npm run typecheck

      - name: Build static application
        run: npm run build

      - name: Verify export artifact
        run: test -f out/index.html
